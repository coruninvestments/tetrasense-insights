<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" fill="none">
  <defs>
    <radialGradient id="insightGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6FAF9F" stop-opacity="0.10"/>
      <stop offset="70%" stop-color="#6FAF9F" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#6FAF9F" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="unknownCore" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F2EEE5"/>
      <stop offset="100%" stop-color="#6FAF9F"/>
    </linearGradient>
  </defs>

  <rect width="600" height="400" fill="#0B0F0E"/>
  <rect width="600" height="400" fill="url(#insightGlow)"/>

  <!-- outer halo -->
  <circle cx="300" cy="200" r="120" stroke="#EDE8DE" stroke-opacity="0.16" stroke-width="1"/>
  <circle cx="300" cy="200" r="90" stroke="#6FAF9F" stroke-opacity="0.14" stroke-width="0.9"/>

  <!-- faint constellation nodes -->
  <g>
    <circle cx="180" cy="120" r="1.4" fill="#EDE8DE" fill-opacity="0.40"/>
    <circle cx="240" cy="90" r="1.2" fill="#6FAF9F" fill-opacity="0.40"/>
    <circle cx="360" cy="92" r="1.3" fill="#EDE8DE" fill-opacity="0.36"/>
    <circle cx="430" cy="140" r="1.2" fill="#6FAF9F" fill-opacity="0.38"/>
    <circle cx="440" cy="230" r="1.3" fill="#EDE8DE" fill-opacity="0.34"/>
    <circle cx="380" cy="300" r="1.2" fill="#6FAF9F" fill-opacity="0.32"/>
    <circle cx="220" cy="300" r="1.2" fill="#EDE8DE" fill-opacity="0.32"/>
    <circle cx="160" cy="240" r="1.3" fill="#6FAF9F" fill-opacity="0.36"/>
  </g>

  <!-- partial connections -->
  <g stroke="#6FAF9F" stroke-opacity="0.12" stroke-width="0.8">
    <line x1="240" y1="90" x2="300" y2="160"/>
    <line x1="360" y1="92" x2="300" y2="160"/>
    <line x1="380" y1="300" x2="300" y2="240"/>
    <line x1="220" y1="300" x2="300" y2="240"/>
  </g>

  <!-- central unknown node -->
  <circle cx="300" cy="200" r="18" fill="url(#unknownCore)" opacity="0.9"/>

  <!-- dotted discovery ring -->
  <circle cx="300" cy="200" r="52"
    stroke="#6FAF9F"
    stroke-opacity="0.26"
    stroke-width="1"
    stroke-dasharray="3 6"/>

  <!-- subtle pulse arcs -->
  <path d="M260 210 C275 195 325 195 340 210"
    stroke="#6FAF9F"
    stroke-opacity="0.30"
    stroke-width="1.2"
    stroke-linecap="round"/>

  <path d="M270 228 C282 215 318 215 330 228"
    stroke="#EDE8DE"
    stroke-opacity="0.22"
    stroke-width="1"
    stroke-linecap="round"/>

</svg>
