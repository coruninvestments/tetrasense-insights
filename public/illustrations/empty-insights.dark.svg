<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
<defs>
  <radialGradient id="eid-halo" cx="50%" cy="50%" r="40%">
    <stop offset="0%" stop-color="#6FAF9F" stop-opacity="0.4"/>
    <stop offset="55%" stop-color="#6FAF9F" stop-opacity="0.12"/>
    <stop offset="100%" stop-color="#6FAF9F" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="eid-leaf1" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#7BBFAF"/>
    <stop offset="100%" stop-color="#5a8a6e"/>
  </linearGradient>
  <linearGradient id="eid-leaf2" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#5a8a6e"/>
    <stop offset="100%" stop-color="#3d6b52"/>
  </linearGradient>
</defs>

<rect width="600" height="400" fill="#0E1915"/>

<circle cx="300" cy="200" r="130" fill="url(#eid-halo)"/>

<!-- Orbit rings -->
<circle cx="300" cy="200" r="110" stroke="#6FAF9F" stroke-width="0.7" fill="none" opacity="0.3"/>
<circle cx="300" cy="200" r="75" stroke="#6FAF9F" stroke-width="0.5" fill="none" opacity="0.2"/>

<!-- Small leaf center -->
<path d="M300 172 C300 172, 293 183, 287 190 C283 194, 280 198, 280 206 C280 214, 286 221, 294 221 C296 221, 298 220.5, 299 220 L300 219 Z"
      fill="url(#eid-leaf1)" opacity="0.7"/>
<path d="M300 172 C300 172, 307 183, 313 190 C317 194, 320 198, 320 206 C320 214, 314 221, 306 221 C304 221, 302 220.5, 301 220 L300 219 Z"
      fill="url(#eid-leaf2)" opacity="0.7"/>

<!-- Signal arcs (smaller) -->
<path d="M290 205 C293 202, 296 200, 300 200 C304 200, 307 202, 310 205"
      stroke="#8FCFC0" stroke-width="0.9" stroke-linecap="round" fill="none" opacity="0.5"/>
<path d="M286 210 C290 206, 295 204, 300 204 C305 204, 310 206, 314 210"
      stroke="#8FCFC0" stroke-width="0.7" stroke-linecap="round" fill="none" opacity="0.35"/>

<!-- Constellation dots — scattered "data points waiting" -->
<circle cx="210" cy="140" r="1.5" fill="#6FAF9F" opacity="0.5"/>
<circle cx="390" cy="130" r="1.3" fill="#6FAF9F" opacity="0.45"/>
<circle cx="420" cy="260" r="1.4" fill="#6FAF9F" opacity="0.4"/>
<circle cx="180" cy="270" r="1.2" fill="#6FAF9F" opacity="0.4"/>
<circle cx="240" cy="100" r="0.9" fill="#8FCFC0" opacity="0.3"/>
<circle cx="360" cy="95" r="1.0" fill="#8FCFC0" opacity="0.3"/>
<circle cx="450" cy="200" r="0.8" fill="#6FAF9F" opacity="0.25"/>
<circle cx="150" cy="195" r="0.9" fill="#6FAF9F" opacity="0.25"/>

<!-- Dashed connector lines (incomplete — "not enough data yet") -->
<line x1="210" y1="140" x2="300" y2="200" stroke="#6FAF9F" stroke-width="0.4" stroke-dasharray="4 6" opacity="0.2"/>
<line x1="390" y1="130" x2="300" y2="200" stroke="#6FAF9F" stroke-width="0.4" stroke-dasharray="4 6" opacity="0.2"/>
<line x1="420" y1="260" x2="300" y2="200" stroke="#6FAF9F" stroke-width="0.4" stroke-dasharray="4 6" opacity="0.2"/>
<line x1="180" y1="270" x2="300" y2="200" stroke="#6FAF9F" stroke-width="0.4" stroke-dasharray="4 6" opacity="0.2"/>
</svg>