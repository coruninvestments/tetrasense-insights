<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
<defs>
  <radialGradient id="phd-halo" cx="50%" cy="48%" r="38%">
    <stop offset="0%" stop-color="#6FAF9F" stop-opacity="0.5"/>
    <stop offset="50%" stop-color="#6FAF9F" stop-opacity="0.15"/>
    <stop offset="100%" stop-color="#6FAF9F" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="phd-inner" cx="50%" cy="48%" r="18%">
    <stop offset="0%" stop-color="#8FCFC0" stop-opacity="0.25"/>
    <stop offset="100%" stop-color="#6FAF9F" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="phd-leaf1" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#7BBFAF"/>
    <stop offset="100%" stop-color="#5a8a6e"/>
  </linearGradient>
  <linearGradient id="phd-leaf2" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#5a8a6e"/>
    <stop offset="100%" stop-color="#3d6b52"/>
  </linearGradient>
</defs>

<rect width="600" height="400" fill="#0B1411"/>

<!-- Outer halo -->
<circle cx="300" cy="192" r="150" fill="url(#phd-halo)"/>
<!-- Inner glow -->
<circle cx="300" cy="192" r="80" fill="url(#phd-inner)"/>

<!-- Halo rings -->
<circle cx="300" cy="192" r="120" stroke="#6FAF9F" stroke-width="0.8" fill="none" opacity="0.35"/>
<circle cx="300" cy="192" r="85" stroke="#6FAF9F" stroke-width="0.6" fill="none" opacity="0.25"/>

<!-- Leaf silhouette — left half -->
<path d="M300 148 C300 148, 288 168, 276 180 C268 188, 262 196, 262 210 C262 224, 272 236, 286 236 C290 236, 294 235, 297 233 L300 231 Z"
      fill="url(#phd-leaf1)" opacity="0.85"/>
<!-- Leaf silhouette — right half -->
<path d="M300 148 C300 148, 312 168, 324 180 C332 188, 338 196, 338 210 C338 224, 328 236, 314 236 C310 236, 306 235, 303 233 L300 231 Z"
      fill="url(#phd-leaf2)" opacity="0.85"/>

<!-- Signal pulse arcs -->
<path d="M282 208 C286 204, 292 201, 300 201 C308 201, 314 204, 318 208"
      stroke="#8FCFC0" stroke-width="1.2" stroke-linecap="round" fill="none" opacity="0.7"/>
<path d="M276 216 C282 210, 290 206, 300 206 C310 206, 318 210, 324 216"
      stroke="#8FCFC0" stroke-width="1" stroke-linecap="round" fill="none" opacity="0.5"/>
<path d="M270 224 C278 216, 288 212, 300 212 C312 212, 322 216, 330 224"
      stroke="#8FCFC0" stroke-width="0.8" stroke-linecap="round" fill="none" opacity="0.35"/>

<!-- Constellation dots -->
<circle cx="200" cy="120" r="1.2" fill="#6FAF9F" opacity="0.6"/>
<circle cx="400" cy="110" r="1.4" fill="#6FAF9F" opacity="0.5"/>
<circle cx="420" cy="280" r="1.0" fill="#6FAF9F" opacity="0.4"/>
<circle cx="180" cy="270" r="1.3" fill="#6FAF9F" opacity="0.5"/>
<circle cx="230" cy="90" r="0.8" fill="#8FCFC0" opacity="0.4"/>
<circle cx="370" cy="85" r="0.9" fill="#8FCFC0" opacity="0.35"/>
<circle cx="440" cy="190" r="1.0" fill="#6FAF9F" opacity="0.3"/>
<circle cx="160" cy="200" r="1.1" fill="#6FAF9F" opacity="0.3"/>
<circle cx="350" cy="310" r="0.9" fill="#6FAF9F" opacity="0.3"/>
<circle cx="250" cy="320" r="1.0" fill="#6FAF9F" opacity="0.25"/>

<!-- Constellation lines -->
<line x1="200" y1="120" x2="230" y2="90" stroke="#6FAF9F" stroke-width="0.4" opacity="0.2"/>
<line x1="400" y1="110" x2="370" y2="85" stroke="#6FAF9F" stroke-width="0.4" opacity="0.2"/>
<line x1="420" y1="280" x2="440" y2="190" stroke="#6FAF9F" stroke-width="0.4" opacity="0.15"/>
<line x1="180" y1="270" x2="160" y2="200" stroke="#6FAF9F" stroke-width="0.4" opacity="0.15"/>
</svg>