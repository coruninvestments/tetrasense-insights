<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 160" fill="none">
  <!-- Dark theme: empty library — stacked cards with leaf motif -->
  <circle cx="120" cy="85" r="55" fill="#6FAF9F" opacity="0.04"/>

  <!-- Back card -->
  <rect x="72" y="50" width="96" height="64" rx="8" stroke="#6FAF9F" stroke-width="0.8" opacity="0.15" transform="rotate(-3 120 82)"/>

  <!-- Front card -->
  <rect x="76" y="54" width="88" height="58" rx="7" stroke="#6FAF9F" stroke-width="1" opacity="0.35" fill="#6FAF9F" fill-opacity="0.03"/>

  <!-- Card inner lines (product details placeholder) -->
  <g stroke="#6FAF9F" stroke-width="0.6" stroke-linecap="round" opacity="0.2">
    <line x1="88" y1="70" x2="130" y2="70"/>
    <line x1="88" y1="77" x2="120" y2="77"/>
    <line x1="88" y1="84" x2="110" y2="84"/>
  </g>

  <!-- Leaf accent on card -->
  <path d="M145 64 C145 64 140 70 140 76 C140 80 142 82 146 82 C150 82 152 80 152 76 C152 70 147 64 147 64 Q146 62 145 64Z"
    stroke="#6FAF9F" stroke-width="0.8" fill="none" opacity="0.3"/>

  <!-- Plus / add hint -->
  <circle cx="120" cy="125" r="12" stroke="#6FAF9F" stroke-width="0.8" opacity="0.25" stroke-dasharray="3 4"/>
  <line x1="120" y1="120" x2="120" y2="130" stroke="#6FAF9F" stroke-width="1" stroke-linecap="round" opacity="0.3"/>
  <line x1="115" y1="125" x2="125" y2="125" stroke="#6FAF9F" stroke-width="1" stroke-linecap="round" opacity="0.3"/>

  <!-- Stars -->
  <g opacity="0.3" fill="#6FAF9F">
    <circle cx="55" cy="45" r="1"/>
    <circle cx="185" cy="55" r="1.2"/>
    <circle cx="48" cy="100" r="0.8"/>
    <circle cx="192" cy="95" r="1"/>
  </g>
</svg>