  <circle cx="160" cy="80" r="28" stroke="#3D6B5E" stroke-width="1" opacity="0.2"/>

  <!-- Central leaf -->
  <path d="M156 58 C156 58 146 70 146 82 C146 92 151 97 160 97 C169 97 174 92 174 82 C174 70 164 58 164 58 Q160 52 156 58Z"
