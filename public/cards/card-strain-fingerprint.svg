<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" fill="none">
  <defs>
    <linearGradient id="bgGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B0F0E"/>
      <stop offset="100%" stop-color="#1E2B25"/>
    </linearGradient>

    <radialGradient id="haloGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6FAF9F" stop-opacity="0.18"/>
      <stop offset="70%" stop-color="#6FAF9F" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#6FAF9F" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="leafCore" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F2EEE5"/>
      <stop offset="100%" stop-color="#6FAF9F"/>
    </linearGradient>
  </defs>

  <rect width="900" height="500" fill="url(#bgGradient)"/>

  <!-- fingerprint radar -->
  <circle cx="640" cy="250" r="140" fill="url(#haloGlow)"/>
  <circle cx="640" cy="250" r="120" stroke="#6FAF9F" stroke-opacity="0.24"/>
  <circle cx="640" cy="250" r="90" stroke="#EDE8DE" stroke-opacity="0.16"/>
  <circle cx="640" cy="250" r="60" stroke="#6FAF9F" stroke-opacity="0.12"/>

  <!-- fingerprint polygon -->
  <polygon
    points="640,160 710,210 690,310 590,310 570,210"
    fill="#6FAF9F"
    fill-opacity="0.18"
    stroke="#6FAF9F"
    stroke-opacity="0.45"
  />

  <!-- center leaf -->
  <path d="M640 280
    C615 245 615 205 640 180
    C665 205 665 245 640 280Z"
    fill="url(#leafCore)"/>

  <line x1="640" y1="280" x2="640" y2="305"
    stroke="#EDE8DE"
    stroke-opacity="0.55"
    stroke-width="3"
    stroke-linecap="round"/>

  <!-- constellation -->
  <circle cx="640" cy="96" r="2.5" fill="#EDE8DE"/>
  <circle cx="770" cy="160" r="1.8" fill="#6FAF9F"/>
  <circle cx="790" cy="320" r="1.8" fill="#EDE8DE"/>
  <circle cx="640" cy="404" r="2.3" fill="#6FAF9F"/>
  <circle cx="510" cy="320" r="1.8" fill="#EDE8DE"/>
  <circle cx="490" cy="160" r="1.8" fill="#6FAF9F"/>

  <!-- left content -->
  <text x="90" y="110"
    fill="#EDE8DE"
    font-size="22"
    font-family="system-ui"
    opacity="0.8">
    Signal Leaf
  </text>

  <text x="90" y="170"
    fill="#F2EEE5"
    font-size="44"
    font-family="system-ui"
    font-weight="600">
    Strain Fingerprint
  </text>

  <text x="90" y="230"
    fill="#6FAF9F"
    font-size="30"
    font-family="system-ui">
    Blue Dream
  </text>

  <text x="90" y="285"
    fill="#EDE8DE"
    font-size="20"
    font-family="system-ui"
    opacity="0.9">
    Match Score
  </text>

  <text x="90" y="315"
    fill="#F2EEE5"
    font-size="26"
    font-family="system-ui">
    92%
  </text>

  <text x="90" y="360"
    fill="#EDE8DE"
    font-size="20"
    font-family="system-ui"
    opacity="0.9">
    Dominant terpene
  </text>

  <text x="90" y="392"
    fill="#F2EEE5"
    font-size="24"
    font-family="system-ui">
    Myrcene
  </text>

  <text x="90" y="440"
    fill="#6FAF9F"
    font-size="18"
    font-family="system-ui">
    Generated from your Signal Leaf history
  </text>

</svg>
