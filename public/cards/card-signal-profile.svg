<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" fill="none">
  <defs>
    <linearGradient id="bgGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B0F0E"/>
      <stop offset="100%" stop-color="#1E2B25"/>
    </linearGradient>

    <radialGradient id="haloGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6FAF9F" stop-opacity="0.16"/>
      <stop offset="72%" stop-color="#6FAF9F" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#6FAF9F" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="leafCore" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F2EEE5"/>
      <stop offset="100%" stop-color="#6FAF9F"/>
    </linearGradient>
  </defs>

  <rect width="900" height="500" fill="url(#bgGradient)"/>

  <!-- right-side halo -->
  <circle cx="650" cy="220" r="145" fill="url(#haloGlow)"/>
  <circle cx="650" cy="220" r="124" stroke="#6FAF9F" stroke-opacity="0.20"/>
  <circle cx="650" cy="220" r="94" stroke="#EDE8DE" stroke-opacity="0.14"/>

  <!-- split leaf -->
  <path d="M650 280
    C623 244 623 198 650 172
    C677 198 677 244 650 280Z"
    fill="url(#leafCore)"/>
  <line x1="650" y1="280" x2="650" y2="305"
    stroke="#EDE8DE" stroke-opacity="0.55" stroke-width="3" stroke-linecap="round"/>

  <!-- particles -->
  <circle cx="650" cy="88" r="2.6" fill="#EDE8DE"/>
  <circle cx="776" cy="146" r="1.8" fill="#6FAF9F"/>
  <circle cx="802" cy="274" r="1.8" fill="#EDE8DE"/>
  <circle cx="650" cy="352" r="2.2" fill="#6FAF9F"/>
  <circle cx="522" cy="274" r="1.8" fill="#EDE8DE"/>
  <circle cx="496" cy="146" r="1.8" fill="#6FAF9F"/>

  <!-- left content -->
  <text x="88" y="110"
    fill="#EDE8DE"
    font-size="22"
    font-family="system-ui"
    opacity="0.8">
    Signal Leaf
  </text>

  <text x="88" y="165"
    fill="#F2EEE5"
    font-size="44"
    font-family="system-ui"
    font-weight="600">
    Your Signal Profile
  </text>

  <text x="88" y="218"
    fill="#6FAF9F"
    font-size="30"
    font-family="system-ui">
    Focus Explorer
  </text>

  <text x="88" y="272"
    fill="#EDE8DE"
    font-size="20"
    font-family="system-ui"
    opacity="0.88">
    Top terpene
  </text>
  <text x="88" y="302"
    fill="#F2EEE5"
    font-size="24"
    font-family="system-ui">
    Limonene
  </text>

  <text x="88" y="352"
    fill="#EDE8DE"
    font-size="20"
    font-family="system-ui"
    opacity="0.88">
    Best dose
  </text>
  <text x="88" y="382"
    fill="#F2EEE5"
    font-size="24"
    font-family="system-ui">
    4–7 mg THC
  </text>

  <text x="88" y="435"
    fill="#6FAF9F"
    font-size="18"
    font-family="system-ui">
    Built from your personal Signal Leaf history
  </text>
</svg>
