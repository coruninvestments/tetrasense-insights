<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <!-- Lock with sparkle — premium lock badge -->
  <!-- Lock body -->
  <rect x="6" y="11" width="12" height="10" rx="2" stroke="#6FAF9F" stroke-width="1.2" fill="#6FAF9F" fill-opacity="0.08"/>
  <!-- Lock shackle -->
  <path d="M8 11 V8 C8 5.8 9.8 4 12 4 C14.2 4 16 5.8 16 8 V11"
    stroke="#6FAF9F" stroke-width="1.2" stroke-linecap="round" fill="none"/>
  <!-- Keyhole -->
  <circle cx="12" cy="15.5" r="1.2" fill="#6FAF9F" opacity="0.5"/>
  <!-- Sparkle top-right -->
  <g stroke="#6FAF9F" stroke-width="0.8" stroke-linecap="round" opacity="0.5">
    <line x1="19" y1="3" x2="19" y2="7"/>
    <line x1="17" y1="5" x2="21" y2="5"/>
  </g>
  <!-- Small sparkle -->
  <g stroke="#6FAF9F" stroke-width="0.6" stroke-linecap="round" opacity="0.35">
    <line x1="21" y1="8" x2="21" y2="10"/>
    <line x1="20" y1="9" x2="22" y2="9"/>
  </g>
</svg>